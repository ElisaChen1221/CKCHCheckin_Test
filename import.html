<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel 匯入名單</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script type="module" src="./assets/import.js"></script>
</head>
<body class="requires-auth">
  <header class="site-header">
    <div>
      <h1>Excel 匯入名單</h1>
      <p>請上傳 .xlsx 或 .csv，資料會直接寫入 Firebase Realtime Database。</p>
    </div>
    <nav>
      <span class="auth-chip" data-auth-email>驗證中...</span>
      <a href="./index.html">回報到頁</a>
      <a href="./admin.html">管理總覽</a>
      <button type="button" class="secondary" data-logout>登出</button>
    </nav>
  </header>

  <main class="container">
    <section class="card stack-md">
      <h2>匯入說明</h2>
      <ul class="plain-list">
        <li>必要欄位：<strong>姓名</strong>、<strong>手機</strong></li>
        <li>可選欄位：報名人數、備註</li>
        <li>資料庫欄位已移除 <code>eventName</code></li>
        <li>本頁已加上 Firebase Email/Password 登入保護</li>
      </ul>
      <a class="button-like secondary" href="./sample-import.csv" download>下載 CSV 範本</a>
    </section>

    <section class="card stack-md">
      <h2>上傳檔案</h2>
      <form id="import-form" class="stack-md">
        <input id="import-file" type="file" accept=".xlsx,.xls,.csv" required />
        <label class="checkbox-row">
          <input id="replace-existing" type="checkbox" />
          匯入前清空現有名單
        </label>
        <button type="submit">開始匯入</button>
      </form>
      <p id="import-message" class="message"></p>
      <div id="preview-section" class="hidden stack-md">
        <h3>匯入預覽</h3>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>姓名</th>
                <th>手機</th>
                <th>報名人數</th>
                <th>備註</th>
              </tr>
            </thead>
            <tbody id="preview-body"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
